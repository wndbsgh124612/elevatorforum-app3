name: Build APK and AAB

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify google-services.json
        run: |
          test -f app/google-services.json || (echo "app/google-services.json 파일이 없습니다." && exit 1)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.10.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip
          echo "$PWD/gradle-8.10.2/bin" >> $GITHUB_PATH

      - name: Accept licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Decode keystore if present
        shell: bash
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release-keystore.jks
            echo "KEYSTORE_PATH=$PWD/release-keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Build Release APK and AAB
        run: gradle :app:assembleRelease :app:bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ElevatorForum-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ElevatorForum-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: ElevatorForum-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
